<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Construction Work Order | Oness Infra ERP</title>

<style>

:root{
--primary-blue:#1a2a3a;
--accent-gold:#c5a059;
--light-bg:#f8f9fa;
--border:#ced4da;
--text-dark:#212529;
--highlight:#fffdf5;
}

body{
font-family:'Segoe UI',Arial,sans-serif;
background:#e9ecef;
margin:0;
padding:40px 20px;
color:var(--text-dark);
}

*{
box-sizing:border-box;
}

.erp-container{
max-width:1100px;
margin:auto;
background:#fff;
padding:40px;
box-shadow:0 0 20px rgba(0,0,0,0.15);
}

/* HEADER */

.header-top{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid var(--primary-blue);
padding-bottom:15px;
margin-bottom:20px;
}

.logo-area{
display:flex;
align-items:center;
gap:15px;
}

.company-logo{
width:80px;
height:80px;
object-fit:contain;
}

.logo-text h1{
margin:0;
font-size:26px;
color:var(--primary-blue);
}

.wo-header-info{
text-align:right;
}

.wo-no-box{
background:var(--primary-blue);
color:white;
padding:6px 12px;
font-weight:bold;
border-radius:4px;
margin-bottom:8px;
display:inline-block;
}

/* GRID */

.info-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
margin-bottom:30px;
}

.info-block{
border:1px solid var(--border);
padding:15px;
}

.info-block h3{
margin:-15px -15px 15px -15px;
background:#f1f3f5;
padding:8px 12px;
font-size:13px;
color:var(--primary-blue);
border-bottom:1px solid var(--border);
}

.form-row{
display:flex;
margin-bottom:8px;
align-items:center;
}

.form-row label{
width:130px;
font-size:11px;
font-weight:bold;
text-transform:uppercase;
color:#777;
}

.form-row input,
.form-row select{
flex:1;
border:none;
border-bottom:1px solid #eee;
padding:4px;
font-size:13px;
}

/* TABLE */

.section-title{
background:var(--primary-blue);
color:white;
padding:8px 12px;
font-size:14px;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#e9ecef;
border:1px solid var(--border);
padding:10px;
font-size:11px;
text-transform:uppercase;
}

table td{
border:1px solid var(--border);
padding:8px;
}

table input{
width:100%;
border:none;
font-size:13px;
}

/* BUTTONS */

.btn{
padding:10px 18px;
border:none;
border-radius:4px;
cursor:pointer;
font-weight:bold;
}

.btn-add{
background:#eee;
font-size:11px;
margin-top:8px;
}

.actions{
position:fixed;
bottom:20px;
right:20px;
display:flex;
gap:10px;
}

.btn-print{
background:#6c757d;
color:white;
}

.btn-save{
background:var(--primary-blue);
color:white;
}

</style>
</head>

<body>

<div class="erp-container">

<div class="header-top">

<div class="logo-area">
<img src="logo.png" class="company-logo">
<div class="logo-text">
<h1>ONESS INFRA PRIVATE LIMITED</h1>
</div>
</div>

<div class="wo-header-info">

<div class="wo-no-box">
WO No: <span id="displayWONo">AUTO</span>
</div>

<div class="form-row">
<label>Date</label>
<input type="date" id="woDate">
</div>

<div class="form-row">
<label>Work Type</label>
<select id="workType">
<option>Without Material</option>
<option>With Material</option>
</select>
</div>

</div>
</div>

<!-- VENDOR + SITE -->

<div class="info-grid">

<div class="info-block">

<h3>VENDOR / CONTRACTOR DETAILS</h3>

<div class="form-row">
<label>Vendor Name</label>
<select id="vendorSelect" onchange="autoFillVendor()">
<option>Select Vendor</option>
<option>Vendor A</option>
<option>Vendor B</option>
</select>
</div>

<div class="form-row">
<label>Code</label>
<input id="vCode">
</div>

<div class="form-row">
<label>Aadhar</label>
<input id="vAadhar">
</div>

<div class="form-row">
<label>PAN</label>
<input id="vPan">
</div>

<div class="form-row">
<label>GST</label>
<input id="vGst">
</div>

<div class="form-row">
<label>Contractor Type</label>
<input id="vType">
</div>

</div>

<div class="info-block">

<h3>SITE DETAILS</h3>

<div class="form-row">
<label>Site Name</label>
<select id="siteSelect" onchange="autoFillSite()">
<option>Select Site</option>
<option>Site A</option>
<option>Site B</option>
</select>
</div>

<div class="form-row">
<label>Address</label>
<input id="sDelivered">
</div>

<div class="form-row">
<label>Contact</label>
<input id="sContact">
</div>

<div class="form-row">
<label>Engineer</label>
<input id="sEngineer">
</div>

</div>

</div>

<!-- WORK TABLE -->

<div class="section-title">
WORK SCHEDULE
</div>

<table>

<thead>
<tr>
<th>S.N.</th>
<th>Location</th>
<th>Work Details</th>
<th>Unit</th>
<th>Area</th>
<th>Rate</th>
<th>Amount</th>
</tr>
</thead>

<tbody id="workBody">

<tr>
<td>1</td>
<td><input></td>
<td><input></td>
<td><input></td>
<td><input type="number" class="area-val" oninput="calculateTotals()"></td>
<td><input type="number" class="rate-val" oninput="calculateTotals()"></td>
<td class="row-amt">0</td>
</tr>

</tbody>

</table>

<button class="btn btn-add" onclick="addRow()">
+ Add Work Item
</button>

</div>

<!-- ACTION BUTTONS -->

<div class="actions">

<button class="btn btn-print" onclick="window.print()">
Print
</button>

<button class="btn btn-save" onclick="saveToLog()">
Submit
</button>

</div>

<script>

/* AUTO CALCULATE */

function calculateTotals(){

document.querySelectorAll("#workBody tr").forEach(row=>{

let area=parseFloat(row.querySelector(".area-val").value)||0
let rate=parseFloat(row.querySelector(".rate-val").value)||0

let total=area*rate

row.querySelector(".row-amt").innerText=total.toFixed(2)

})

}

/* ADD ROW */

function addRow(){

let tbody=document.getElementById("workBody")
let row=tbody.insertRow()

let count=tbody.rows.length

row.innerHTML=`
<td>${count}</td>
<td><input></td>
<td><input></td>
<td><input></td>
<td><input type="number" class="area-val" oninput="calculateTotals()"></td>
<td><input type="number" class="rate-val" oninput="calculateTotals()"></td>
<td class="row-amt">0</td>
`

}

/* AUTOFILL VENDOR */

function autoFillVendor(){

let vendor=document.getElementById("vendorSelect").value

if(vendor=="Vendor A"){

document.getElementById("vCode").value="V001"
document.getElementById("vPan").value="ABCDE1234F"
document.getElementById("vGst").value="27ABCDE1234F1Z5"
document.getElementById("vType").value="Labour"

}

}

/* AUTOFILL SITE */

function autoFillSite(){

let site=document.getElementById("siteSelect").value

if(site=="Site A"){

document.getElementById("sDelivered").value="Indore"
document.getElementById("sContact").value="Site Manager"
document.getElementById("sEngineer").value="9876543210"

}

}

/* SAVE DATA */

function saveToLog(){

let data={
woNumber:document.getElementById("displayWONo").innerText,
date:document.getElementById("woDate").value,
vendor:document.getElementById("vendorSelect").value,
contractorType:document.getElementById("vType").value
}

console.log(data)

alert("Data Ready to Send to Google Sheet")

}

</script>

</body>
</html>
