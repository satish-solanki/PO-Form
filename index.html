```html
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Construction Work Order | Oness Infra ERP</title>

<style>

/* ================= ROOT COLORS ================= */

:root{
--primary-blue:#1a2a3a;
--accent-gold:#c5a059;
--light-bg:#f8f9fa;
--border:#ced4da;
--text-dark:#212529;
--highlight:#fffdf5;
}

/* ================= BODY ================= */

body{
font-family:'Segoe UI',Arial,sans-serif;
background:#e9ecef;
margin:0;
padding:40px 20px;
color:var(--text-dark);
line-height:1.4;
}

*{
box-sizing:border-box;
}

/* ================= MAIN CONTAINER ================= */

.erp-container{
max-width:1100px;
margin:0 auto;
background:#fff;
padding:50px;
box-shadow:0 0 20px rgba(0,0,0,0.15);
position:relative;
}

/* ================= HEADER ================= */

.header-top{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
border-bottom:2px solid var(--primary-blue);
padding-bottom:15px;
margin-bottom:20px;
}

.logo-area{
display:flex;
align-items:center;
gap:18px;
flex-wrap:nowrap;
flex:1;
}

.company-logo{
width:90px;
height:90px;
object-fit:contain;
}

.logo-text h1{
margin:0;
font-size:28px;
letter-spacing:0.8px;
color:var(--primary-blue);
}

.logo-text p{
margin:2px 0;
font-size:12px;
color:#666;
font-weight:bold;
}

.wo-header-info{
text-align:right;
}

.wo-no-box{
background:var(--primary-blue);
color:white;
padding:8px 15px;
font-weight:bold;
margin-bottom:10px;
border-radius:4px;
display:inline-block;
}

/* ================= GRID SECTIONS ================= */

.info-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
margin-bottom:30px;
}

.info-block{
border:1px solid var(--border);
padding:15px;
border-radius:4px;
}

.info-block h3{
margin:-15px -15px 15px -15px;
background:#f1f3f5;
padding:8px 15px;
font-size:13px;
border-bottom:1px solid var(--border);
color:var(--primary-blue);
}

/* ================= FORM ================= */

.form-row{
display:flex;
margin-bottom:8px;
align-items:center;
}

.form-row label{
width:130px;
font-size:11px;
font-weight:bold;
color:#777;
text-transform:uppercase;
}

.form-row input,
.form-row select{
flex:1;
border:none;
border-bottom:1px solid #eee;
padding:4px 0;
font-size:13px;
font-weight:600;
background:transparent;
}

/* ================= TABLE ================= */

.section-title{
background:var(--primary-blue);
color:white;
padding:8px 15px;
font-size:14px;
font-weight:bold;
margin-top:30px;
}

table{
width:100%;
border-collapse:collapse;
margin-bottom:10px;
}

table th{
background:#e9ecef;
border:1px solid var(--border);
padding:10px;
font-size:11px;
text-transform:uppercase;
}

table td{
border:1px solid var(--border);
padding:8px;
}

table input{
width:100%;
border:none;
font-size:13px;
background:transparent;
}

/* ================= CONTENT BOX ================= */

.content-grid{
display:grid;
gap:16px;
margin-top:20px;
}

.content-box{
border:1px solid var(--border);
padding:15px;
}

.content-box h4{
margin-top:0;
color:var(--primary-blue);
border-bottom:1px solid #eee;
padding-bottom:5px;
}

.editable-area{
outline:none;
min-height:120px;
font-size:12px;
line-height:1.6;
}

.editable-area:focus{
background:var(--highlight);
}

/* ================= SIGNATURE ================= */

.signature-area{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:60px;
text-align:center;
}

.sig-box{
border-top:1px solid #000;
padding-top:10px;
font-size:11px;
font-weight:bold;
}

/* ================= FOOTER ================= */

.footer-address{
margin-top:40px;
font-size:10px;
color:#888;
text-align:center;
border-top:1px solid #eee;
padding-top:15px;
}

/* ================= ACTION BUTTONS ================= */

.actions{
position:fixed;
bottom:20px;
right:20px;
display:flex;
gap:10px;
z-index:1000;
}

.btn{
padding:10px 20px;
border-radius:4px;
border:none;
cursor:pointer;
font-weight:bold;
}

.btn-add{
background:#eee;
font-size:10px;
margin-top:5px;
}

.btn-print{
background:#6c757d;
color:white;
}

.btn-save{
background:var(--primary-blue);
color:white;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

.header-top{
flex-direction:column;
align-items:flex-start;
}

.logo-area{
flex-direction:column;
align-items:flex-start;
}

.wo-header-info{
width:100%;
text-align:left;
}

}

</style>
</head>

<body>

<div class="erp-container">

<!-- HEADER -->

<div class="header-top">

<div class="logo-area">
<img src="oness-infra-logo.jpg" class="company-logo">
<div class="logo-text">
<h1>ONESS INFRA PRIVATE LIMITED</h1>
</div>
</div>

<div class="wo-header-info">

<div class="wo-no-box">
WO No:
<span id="displayWONo">RESI/SITE/WO1/20260319</span>
</div>

<div class="form-row">
<label>Date</label>
<input type="text" id="woDate" readonly>
</div>

<div class="form-row">
<label>Work Type</label>

<select id="workType">
<option>Without Material</option>
<option>With Material</option>
</select>

</div>

</div>
</div>

<!-- VENDOR + SITE DETAILS -->

<div class="info-grid">

<div class="info-block">

<h3>VENDOR / CONTRACTOR DETAILS</h3>

<div class="form-row">
<label>Vendor Name</label>
<select id="vendorSelect" onchange="autoFillVendor()">
<option>-- Select Vendor --</option>
</select>
</div>

<div class="form-row">
<label>Code</label>
<input id="vCode" readonly>
</div>

<div class="form-row">
<label>Aadhar No</label>
<input id="vAadhar" readonly>
</div>

<div class="form-row">
<label>PAN No</label>
<input id="vPan" readonly>
</div>

<div class="form-row">
<label>GST No</label>
<input id="vGst" readonly>
</div>

</div>

<div class="info-block">

<h3>SITE & DELIVERY DETAILS</h3>

<div class="form-row">
<label>Site Name</label>

<select id="siteSelect" onchange="autoFillSite()">
<option>-- Select Site --</option>
</select>

</div>

<div class="form-row">
<label>Address</label>
<input id="sDelivered">
</div>

<div class="form-row">
<label>Contact Person</label>
<input id="sContact">
</div>

<div class="form-row">
<label>Mo No</label>
<input id="sEngineer">
</div>

</div>
</div>

<!-- WORK TABLE -->

<div class="section-title">
WORK SCHEDULE & AREA DETAILS
</div>

<table>

<thead>

<tr>
<th>S.N.</th>
<th>Floor/Location</th>
<th>Details of Work</th>
<th>Unit</th>
<th>Area</th>
<th>Rate</th>
<th>Amount</th>
</tr>

</thead>

<tbody id="workBody">

<tr>

<td>1</td>

<td><input value="EXTERNAL PLASTER"></td>

<td><input value="soft"></td>

<td><input value="sqft"></td>

<td><input type="number" class="area-val" oninput="calculateTotals()"></td>

<td><input type="number" class="rate-val" oninput="calculateTotals()"></td>

<td class="row-amt">0</td>

</tr>

</tbody>

</table>

<button class="btn btn-add" onclick="addRow('workBody')">
+ Add Work Item
</button>

<!-- ACTION BUTTONS -->

<div class="actions">

<button class="btn btn-print" onclick="window.print()">
Print
</button>

<button class="btn btn-save" onclick="saveToLog()">
Submit to Log
</button>

</div>

</div>

<script>

/* ================== CALCULATE TOTAL ================== */

function calculateTotals(){

let grandTotal=0;

document.querySelectorAll('#workBody tr').forEach(row=>{

const area=parseFloat(row.querySelector('.area-val')?.value)||0;
const rate=parseFloat(row.querySelector('.rate-val')?.value)||0;

const total=area*rate;

row.querySelector('.row-amt').textContent=total.toFixed(2);

grandTotal+=total;

});

}

/* ================== ADD ROW ================== */

function addRow(id){

const tbody=document.getElementById(id);
const row=document.createElement('tr');
const count=tbody.rows.length+1;

row.innerHTML=`
<td>${count}</td>
<td><input></td>
<td><input></td>
<td><input></td>
<td><input type="number" class="area-val" oninput="calculateTotals()"></td>
<td><input type="number" class="rate-val" oninput="calculateTotals()"></td>
<td class="row-amt">0</td>
`;

tbody.appendChild(row);

}

</script>

</body>
</html>
